; comskip.ini - Comskip configuration for US OTA (ATSC) broadcasts
; Tuned for HDHomeRun MPEG-TS recordings
;
; Documentation: https://github.com/erikkaashoek/Comskip/wiki
;
; This configuration uses a conservative approach:
; - Prefers leaving some commercials over cutting content
; - Uses multiple detection methods for accuracy
; - Tuned for US broadcast television standards

[Main Settings]
; Detection method: 111 = black frame + logo + scene change + silence
; (conservative with multi-pass to catch what's missed)
detect_method=111

; Exiting
verbose=0

; Output format: 1=EDL (Edit Decision List)
output_edl=1
output_vobsub=0

; Don't add padding around detected segments
added_before=0.00
added_after=0.00

; Minimum commercial break length in seconds
min_commercial_break=15

; Maximum commercial break length in seconds (long breaks ~5 min)
max_commercial_break=360

; Minimum show segment length
min_show_segment=30

; Maximum number of expected commercials per show
max_commercials=80

[Tuning]
; Black frame detection (original tighter values)
max_brightness=60
test_brightness=40
max_avg_brightness=25

; Silence detection (original tighter values)
max_volume=500
min_silence=12

; Uniformity (solid color frames)
non_uniformity=500

; Scene change detection
max_scene_change_threshold=80

; Logo detection
logo_at_bottom=0
logo_threshold=0.75
logo_filter=0

; Aspect ratio (standard def 4:3 vs widescreen 16:9)
; 0 = auto detect
aspect_ratio=0

[Global Removes]
; Remove segments shorter than this (in frames)
delete_show_before_or_after_current=0
delete_show_before_first_commercial=0
delete_show_after_last_commercial=0

[Live TV]
; Not needed for recorded content
live_tv=0

[Output Control]
; Only output EDL format
output_edl=1
output_srt=0
output_smi=0
output_chapters=0
output_mls=0
output_dvrmstb=0
output_btv=0
output_projectx=0
output_videoredo=0
output_zoomplayer=0
output_demux=0
output_data=0
