[paths]
television_dir = /television
database_path = /home/deck/comskip/tvtrim.db
log_dir = /home/deck/comskip/logs
comskip_binary = /usr/local/bin/comskip
comskip_ini = /home/deck/comskip/comskip.ini

[processing]
min_age_hours = 6
file_extension = .mpg
process_order = oldest_first
max_passes = 3

[ffmpeg]
binary = /usr/bin/ffmpeg
output_format = mpg
copy_streams = true
